<svg width="420" height="90" viewBox="0 0 420 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00c6ff"/>
    </linearGradient>
  </defs>

  <text x="0" y="32" font-family="Segoe UI, Verdana, sans-serif" font-size="26" font-weight="700" fill="#ffffff">Hey there</text>

  <text id="wave" x="158" y="32" font-size="26">👋</text>
  <animateTransform xlink:href="#wave" attributeName="transform" type="rotate"
    values="0 168 22; 20 168 22; -10 168 22; 20 168 22; 0 168 22"
    dur="1.4s" repeatCount="indefinite"/>

  <text x="0" y="70" font-family="Segoe UI, Verdana, sans-serif" font-size="26" font-weight="700" fill="#ffffff">
    I'm <tspan fill="url(#nameGrad)">Pedro Henrique</tspan>
  </text>
</svg>
